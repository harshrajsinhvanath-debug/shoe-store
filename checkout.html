<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | PORTO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>

        /* =============================
           PAGE LAYOUT
        ============================== */
        body {
            background: #f8f8f8;
            font-family: 'Poppins', sans-serif;
        }

        .checkout-wrapper {
            max-width: 1100px;
            margin: 100px auto 80px;
            padding: 0 20px;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* =============================
           LEFT — FORM
        ============================== */
        .checkout-form-box {
            flex: 1;
            background: #fff;
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }

        .checkout-form-box h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #111;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: border 0.2s;
            box-sizing: border-box;
            color: #111;
        }

        .form-group input:focus {
            border-color: #000;
        }

        .form-group input.error {
            border-color: #e53935;
        }

        .error-msg {
            font-size: 12px;
            color: #e53935;
            margin-top: 4px;
            display: none;
        }

        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .place-order-btn {
            width: 100%;
            padding: 15px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.3s;
        }

        .place-order-btn:hover {
            background: #333;
        }

        /* =============================
           RIGHT — ORDER SUMMARY
        ============================== */
        .order-summary-box {
            width: 380px;
            min-width: 340px;
            background: #fff;
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            position: sticky;
            top: 100px;
        }

        .order-summary-box h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #111;
        }

        .summary-item {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .summary-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            background: #f5f5f5;
        }

        .summary-item-info {
            flex: 1;
        }

        .summary-item-info p {
            font-size: 13px;
            font-weight: 600;
            color: #111;
            margin: 0 0 4px;
            line-height: 1.3;
        }

        .summary-item-info span {
            font-size: 12px;
            color: #888;
        }

        .summary-item-price {
            font-size: 14px;
            font-weight: 700;
            color: #111;
            white-space: nowrap;
        }

        .summary-totals {
            margin-top: 8px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
        }

        .summary-row.total {
            font-size: 17px;
            font-weight: 700;
            color: #111;
            border-top: 2px solid #f0f0f0;
            padding-top: 14px;
            margin-top: 6px;
        }

        .empty-cart-msg {
            text-align: center;
            padding: 40px 0;
            color: #888;
            font-size: 14px;
        }

        /* =============================
           SUCCESS MODAL
        ============================== */
        .success-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .success-overlay.show {
            display: flex;
        }

        .success-card {
            background: #fff;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .success-card .check-icon {
            width: 70px;
            height: 70px;
            background: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .success-card .check-icon i {
            color: #fff;
            font-size: 28px;
        }

        .success-card h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #111;
        }

        .success-card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .success-card button {
            background: #000;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            font-weight: 600;
        }

        /* =============================
           MOBILE
        ============================== */
        @media (max-width: 768px) {
            .checkout-wrapper {
                flex-direction: column-reverse;
                margin-top: 80px;
            }
            .order-summary-box {
                width: 100%;
                min-width: unset;
                position: static;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }

    </style>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
    <a href="index.html" class="logo">PORTO</a>
    <div class="nav-right">
        <div class="cart-icon">
            <i class="fa-solid fa-bag-shopping icon"></i>
            <span class="cart-count" id="cartcount">0</span>
        </div>
    </div>
</header>

<!-- CHECKOUT PAGE -->
<div class="checkout-wrapper">

    <!-- LEFT: FORM -->
    <div class="checkout-form-box">
        <h2>Shipping Details</h2>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name">
            <p class="error-msg" id="fullNameErr">Please enter your full name.</p>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter 10-digit phone number" maxlength="10">
            <p class="error-msg" id="phoneErr">Please enter a valid 10-digit number.</p>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" id="address" placeholder="House no., Street, Area">
            <p class="error-msg" id="addressErr">Please enter your address.</p>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>City</label>
                <input type="text" id="city" placeholder="City">
                <p class="error-msg" id="cityErr">Please enter city.</p>
            </div>
            <div class="form-group">
                <label>Pincode</label>
                <input type="text" id="pincode" placeholder="6-digit pincode" maxlength="6">
                <p class="error-msg" id="pincodeErr">Please enter valid 6-digit pincode.</p>
            </div>
        </div>

        <button class="place-order-btn" id="placeOrderBtn">
            <i class="fa-solid fa-check"></i> &nbsp; Place Order
        </button>
    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div class="order-summary-box">
        <h2>Order Summary</h2>
        <div id="summaryItems"></div>
        <div class="summary-totals" id="summaryTotals"></div>
    </div>

</div>

<!-- SUCCESS MODAL -->
<div class="success-overlay" id="successOverlay">
    <div class="success-card">
        <div class="check-icon">
            <i class="fa-solid fa-check"></i>
        </div>
        <h3>Order Placed!</h3>
        <p>Your order has been placed successfully.<br>We will deliver it soon.</p>
        <button onclick="window.location.href='index.html'">Continue Shopping</button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    /* =============================
       LOAD CART FROM LOCALSTORAGE
    ============================== */
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    // Update navbar cart count
    const cartBadge = document.getElementById("cartcount");
    function updateCartBadge() {
        const total = cart.reduce((sum, item) => sum + item.qty, 0);
        if (cartBadge) cartBadge.innerText = total;
    }
    updateCartBadge();

    /* =============================
       RENDER ORDER SUMMARY
    ============================== */
    function renderSummary() {
        const summaryItems  = document.getElementById("summaryItems");
        const summaryTotals = document.getElementById("summaryTotals");

        if (cart.length === 0) {
            summaryItems.innerHTML  = `<div class="empty-cart-msg"><i class="fa-solid fa-bag-shopping fa-2x" style="margin-bottom:12px;display:block;"></i>Your cart is empty.</div>`;
            summaryTotals.innerHTML = "";
            return;
        }

        // Items HTML
        let itemsHTML = "";
        cart.forEach(item => {
            const priceNum  = parseFloat(item.price.replace(/[^0-9.]/g, ""));
            const itemTotal = priceNum * item.qty;
            itemsHTML += `
                <div class="summary-item">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="summary-item-info">
                        <p>${item.name}</p>
                        <span>Qty: ${item.qty} × ₹${priceNum}</span>
                    </div>
                    <div class="summary-item-price">₹${itemTotal.toFixed(2)}</div>
                </div>`;
        });

        summaryItems.innerHTML = itemsHTML;

        // Totals using reduce()
        const subtotal  = cart.reduce((sum, item) => {
            const p = parseFloat(item.price.replace(/[^0-9.]/g, ""));
            return sum + p * item.qty;
        }, 0);

        const shipping  = subtotal > 0 ? 99 : 0;
        const total     = subtotal + shipping;

        summaryTotals.innerHTML = `
            <div class="summary-row">
                <span>Subtotal</span>
                <span>₹${subtotal.toFixed(2)}</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>₹${shipping}</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span>₹${total.toFixed(2)}</span>
            </div>`;
    }

    renderSummary();

    /* =============================
       FORM VALIDATION
    ============================== */
    function validateForm() {
        let valid = true;

        const fields = [
            { id: "fullName",  errId: "fullNameErr",  check: v => v.trim().length >= 3 },
            { id: "phone",     errId: "phoneErr",     check: v => /^[0-9]{10}$/.test(v.trim()) },
            { id: "address",   errId: "addressErr",   check: v => v.trim().length >= 5 },
            { id: "city",      errId: "cityErr",      check: v => v.trim().length >= 2 },
            { id: "pincode",   errId: "pincodeErr",   check: v => /^[0-9]{6}$/.test(v.trim()) }
        ];

        fields.forEach(field => {
            const input = document.getElementById(field.id);
            const err   = document.getElementById(field.errId);
            if (!field.check(input.value)) {
                input.classList.add("error");
                err.style.display = "block";
                valid = false;
            } else {
                input.classList.remove("error");
                err.style.display = "none";
            }
        });

        return valid;
    }

    // Remove error on input
    ["fullName","phone","address","city","pincode"].forEach(id => {
        document.getElementById(id).addEventListener("input", function () {
            this.classList.remove("error");
            document.getElementById(id + "Err").style.display = "none";
        });
    });

    /* =============================
       PLACE ORDER BUTTON
    ============================== */
    document.getElementById("placeOrderBtn").addEventListener("click", function () {

        if (cart.length === 0) {
            alert("Your cart is empty! Please add products first.");
            return;
        }

        if (!validateForm()) return;

        // Clear cart
        localStorage.removeItem("cart");

        // Show success modal
      alert("Order placed successfully! 🎉");
      window.location.href = "index.html";
    });

});
</script>

</body>
</html>
